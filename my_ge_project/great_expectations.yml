# great_expectations.yml
# Version: 3
#
# This configuration is tailored for your environment where:
# • Raw data (e.g., ut_loss_history_1.csv) resides in the S3 bucket "grange-seniordesign-bucket"
#   under the prefix "raw-data/"
# • All Great Expectations artifacts (expectations, validations, checkpoints, data docs) are
#   stored in S3 under the "great_expectations/" prefix.
#
# Considerations for future enhancements:
#   - Datasource adjustments: If you need to support additional file types or change the regex,
#     update the 'pattern' in default_regex below.
#   - Customizations/Overrides: You can override default behaviors using environment variables
#     or Airflow Variables. For example, you might switch between local and S3 storage for data docs.
#   - Data Docs Accessibility: If you want your GE data docs to be publicly accessible, you will
#     need to adjust your S3 bucket policy for the 'great_expectations/data_docs' prefix.
#   - Additional Stores: A local filesystem store is provided as an example (commented out) for backup.
#

version: 3

# --- Datasources ---
# Defines how GE connects to your data.
# This datasource is configured to read CSV files from S3 under the "raw-data" prefix.
datasources:
  my_s3_datasource:
    class_name: Datasource
    module_name: great_expectations.datasource  # Optional, can be omitted if using default
    execution_engine:
      class_name: PandasExecutionEngine  # Change to SparkDFExecutionEngine if needed
    data_connectors:
      default_inferred_data_connector_name:
        class_name: InferredAssetS3DataConnector
        bucket: grange-seniordesign-bucket          # Your data bucket
        prefix: raw-data                             # Folder where ut_loss_history_1.csv is stored
        default_regex:
          pattern: (.*)\.csv                          # Adjust if more file types are needed
          group_names:
            - data_asset_name

# --- Stores ---
# Stores are used by GE to keep artifacts like expectations, validations, and checkpoints.
# By default, all artifacts are stored on S3 under the "great_expectations" prefix.
stores:
  expectations_S3_store:
    class_name: ExpectationsStore
    store_backend:
      class_name: TupleS3StoreBackend
      bucket: grange-seniordesign-bucket
      prefix: great_expectations/expectations       # S3 folder for expectation suites
  validations_S3_store:
    class_name: ValidationsStore
    store_backend:
      class_name: TupleS3StoreBackend
      bucket: grange-seniordesign-bucket
      prefix: great_expectations/validations        # S3 folder for validation results
  checkpoint_S3_store:
    class_name: CheckpointStore
    store_backend:
      class_name: TupleS3StoreBackend
      bucket: grange-seniordesign-bucket
      prefix: great_expectations/checkpoints        # S3 folder for checkpoints
  evaluation_parameter_store:
    class_name: EvaluationParameterStore

# Optional: Define an additional local expectations backup store.
# Uncomment if you want to keep a local backup of expectation suites.
# expectations_local_store:
#   class_name: ExpectationsStore
#   store_backend:
#     class_name: TupleFilesystemStoreBackend
#     base_directory: great_expectations/uncommitted/expectations_backup

# Set default store references
expectations_store_name: expectations_S3_store
validations_store_name: validations_S3_store
checkpoint_store_name: checkpoint_S3_store

# --- Data Docs ---
# Data docs generate a web interface to display validations and expectations.
data_docs_sites:
  s3_site:
    class_name: SiteBuilder
    store_backend:
      class_name: TupleS3StoreBackend
      bucket: grange-seniordesign-bucket
      prefix: great_expectations/data_docs          # S3 folder where data docs will be stored
    site_index_builder:
      class_name: DefaultSiteIndexBuilder

# To allow public access, update the corresponding S3 bucket policy for the "great_expectations/data_docs" prefix.

# --- Customizations and Overrides ---
# You can override defaults by setting environment variables or Airflow Variables.
# For example, if you wish to switch datasources or stores, update these sections accordingly.
#
# No additional custom override configuration is included by default.
#

# --- Anonymous Usage Statistics ---
# Disable sending anonymous usage statistics to Great Expectations.
anonymous_usage_statistics:
  enabled: false
